<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Apps Dashboard</title>
    <link rel="stylesheet" href="/01-general/shared.css">
    <style>
        body { display: flex; height: 100vh; overflow: hidden; }

        /* ===== Sidebar ===== */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            transition: width .25s ease;
            overflow: hidden;
            flex-shrink: 0;
        }
        #sidebar.collapsed { width: var(--sidebar-collapsed-width); }

        .sidebar-header {
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,.1);
            white-space: nowrap;
        }

        .sidebar-list {
            list-style: none;
            padding: 8px 0;
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: .9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            transition: background .15s;
        }
        .sidebar-item:hover { background: var(--sidebar-hover); }
        .sidebar-item.active {
            background: var(--sidebar-active);
            font-weight: 600;
        }
        .sidebar-item .icon { font-size: 1.15rem; }

        /* ===== Main area ===== */
        #main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #topbar {
            height: 50px;
            background: var(--header-bg);
            color: var(--header-text);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 14px;
            box-shadow: 0 2px 4px rgba(0,0,0,.15);
            flex-shrink: 0;
        }

        #toggle-sidebar {
            background: transparent;
            color: var(--header-text);
            font-size: 1.4rem;
            padding: 6px 12px;
            border-radius: 4px;
        }
        #toggle-sidebar:hover { background: rgba(255,255,255,.15); }

        #current-app-title { font-size: 1.05rem; font-weight: 600; }

        #app-frame {
            flex: 1;
            border: none;
            width: 100%;
            background: var(--body-bg);
        }

    </style>
</head>
<body>

<!-- ===== Left sidebar ===== -->
<aside id="sidebar">
    <div class="sidebar-header">&#129513; Mini-Apps</div>
    <ul class="sidebar-list" id="sidebar-list"></ul>
</aside>

<!-- ===== Main area ===== -->
<div id="main-area">
    <div id="topbar">
        <button id="toggle-sidebar" title="Toggle sidebar">&#9776;</button>
        <span id="current-app-title">Welcome</span>
    </div>
    <iframe id="app-frame"></iframe>
</div>

<script src="/01-general/shell.js"></script>
</body>
</html>
